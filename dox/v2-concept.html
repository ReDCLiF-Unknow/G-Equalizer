<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G Equalizer v2 Concept</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070d; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
  .app { background: #0d0d14; border-radius: 12px; border: 1px solid #2a2a3d; width: 780px; overflow: hidden; }
  .titlebar { background: #09090f; border-bottom: 1px solid #1e1e2e; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #7c3aed, #db2777); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: #e2e2f0; text-transform: uppercase; }
  .logo-text span { color: #a78bfa; }
  .status-pill { display: flex; align-items: center; gap: 6px; background: #12122a; border: 1px solid #7c3aed44; border-radius: 20px; padding: 4px 12px; font-size: 11px; color: #a78bfa; letter-spacing: 1px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; box-shadow: 0 0 6px #a78bfa; }
  .header-btns { display: flex; gap: 8px; }
  .btn { background: transparent; border: 1px solid #2a2a3d; border-radius: 6px; color: #888; font-size: 11px; padding: 5px 12px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
  .btn-primary { border-color: #7c3aed; color: #a78bfa; background: #7c3aed18; }
  .btn-danger { border-color: #db277744; color: #f472b6; background: #db277712; }
  .body { padding: 16px; }
  .viz-section { background: #09090f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; }
  .viz-label { font-size: 10px; letter-spacing: 2px; color: #444466; text-transform: uppercase; margin-bottom: 10px; }
  .viz-bars { display: flex; align-items: center; gap: 6px; height: 60px; position: relative; }
  .viz-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 60px; justify-content: center; position: relative; }
  .viz-bar { width: 100%; border-radius: 2px; position: absolute; }
  .eq-section { background: #09090f; border: 1px solid #1e1e2e; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
  .eq-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; align-items: end; }
  .band { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .gain-val { font-size: 10px; color: #a78bfa; font-weight: 600; letter-spacing: 0.5px; height: 14px; }
  .slider-wrap { height: 120px; display: flex; align-items: center; justify-content: center; position: relative; }
  .slider-track { width: 4px; height: 110px; background: #1e1e2e; border-radius: 2px; position: relative; }
  .slider-fill { width: 4px; border-radius: 2px; position: absolute; left: 0; }
  .slider-thumb { width: 14px; height: 14px; border-radius: 50%; border: 2px solid; background: #0d0d14; position: absolute; left: 50%; transform: translateX(-50%); box-shadow: 0 0 8px currentColor; }
  .freq-label { font-size: 9px; color: #44445a; letter-spacing: 0.5px; text-align: center; margin-top: 2px; }
  .bottom-row { display: flex; gap: 10px; align-items: center; }
  .preset-label { font-size: 10px; letter-spacing: 2px; color: #44445a; text-transform: uppercase; white-space: nowrap; }
  .preset-chips { display: flex; gap: 6px; flex: 1; }
  .chip { border: 1px solid #2a2a3d; border-radius: 4px; padding: 5px 10px; font-size: 10px; letter-spacing: 1px; color: #555570; text-transform: uppercase; }
  .chip.active { border-color: #7c3aed88; color: #a78bfa; background: #7c3aed18; box-shadow: 0 0 12px #7c3aed22; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div class="logo-text">G<span> EQ</span>UALIZER</div>
    </div>
    <div class="status-pill"><div class="status-dot"></div>EQ ACTIVE</div>
    <div class="header-btns">
      <button class="btn">⚙ Settings</button>
      <button class="btn btn-primary">🎧 Calibrate</button>
      <button class="btn btn-danger">■ Disable</button>
    </div>
  </div>
  <div class="body">
    <div class="viz-section">
      <div class="viz-label">Frequency response</div>
      <div class="viz-bars" id="vizBars"></div>
    </div>
    <div class="eq-section">
      <div class="eq-grid" id="eqGrid"></div>
    </div>
    <div class="bottom-row">
      <div class="preset-label">Preset</div>
      <div class="preset-chips">
        <div class="chip active">FPS</div>
        <div class="chip">RPG</div>
        <div class="chip">Cinematic</div>
        <div class="chip">Flat</div>
      </div>
    </div>
  </div>
</div>
<script>
const freqs = ['32','64','125','250','500','1k','2k','4k','8k','16k'];
const gains = [2, 3, 1, -1, -2, 2, 4, 5, 3, 1];
const colors = ['#7c3aed','#8b35e8','#9d35df','#b535d4','#c935c7','#d63ab9','#e03faa','#e84498','#ee4a87','#f472b6'];

gains.forEach((g, i) => {
  const c = colors[i];
  const band = document.createElement('div'); band.className = 'band';
  const val = document.createElement('div'); val.className = 'gain-val'; val.textContent = (g > 0 ? '+' : '') + g;
  const wrap = document.createElement('div'); wrap.className = 'slider-wrap';
  const track = document.createElement('div'); track.className = 'slider-track';
  const fill = document.createElement('div'); fill.className = 'slider-fill';
  const px = Math.round(Math.abs(g) / 12 * 90);
  fill.style.background = c; fill.style.height = px + 'px';
  if (g >= 0) { fill.style.bottom = '55px'; } else { fill.style.top = '55px'; fill.style.opacity = '0.5'; }
  const thumb = document.createElement('div'); thumb.className = 'slider-thumb';
  thumb.style.borderColor = c; thumb.style.color = c;
  thumb.style.top = (55 - Math.round(g / 12 * 50)) + 'px';
  track.appendChild(fill); track.appendChild(thumb); wrap.appendChild(track);
  const lbl = document.createElement('div'); lbl.className = 'freq-label'; lbl.textContent = freqs[i];
  band.appendChild(val); band.appendChild(wrap); band.appendChild(lbl);
  document.getElementById('eqGrid').appendChild(band);

  const bwrap = document.createElement('div'); bwrap.className = 'viz-bar-wrap';
  const bar = document.createElement('div'); bar.className = 'viz-bar';
  const h = Math.round(Math.abs(g) / 12 * 50) + 4;
  bar.style.height = h + 'px'; bar.style.background = c; bar.style.borderRadius = '2px 2px 0 0';
  if (g >= 0) { bar.style.bottom = '30px'; } else { bar.style.top = '30px'; bar.style.opacity = '0.4'; }
  bwrap.appendChild(bar); document.getElementById('vizBars').appendChild(bwrap);
});
</script>
</body>
</html>
